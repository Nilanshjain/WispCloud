# WispCloud CI/CD Pipeline
# Runs tests on PRs, deploys frontend to Vercel on push to main
# Backend auto-deploys via Render GitHub integration

name: WispCloud CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '20'

jobs:
  # Backend Tests
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: password123

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run linter
        working-directory: ./backend
        run: npm run lint || echo "Linting not configured yet"

      - name: Run unit tests
        working-directory: ./backend
        run: npm test || echo "Tests not configured yet"
        env:
          MONGODB_URI: mongodb://admin:password123@localhost:27017/test?authSource=admin
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key
          SESSION_SECRET: test-session-secret
          NODE_ENV: test

  # Frontend Tests & Build
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/Wisp/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend/Wisp
        run: npm ci

      - name: Run linter
        working-directory: ./frontend/Wisp
        run: npm run lint || echo "Linting not configured yet"

      - name: Run tests
        working-directory: ./frontend/Wisp
        run: npm test || echo "Tests not configured yet"

      - name: Build
        working-directory: ./frontend/Wisp
        run: npm run build
        env:
          VITE_API_URL: https://placeholder.onrender.com

  # Deploy Frontend to Vercel (only on push to main)
  deploy-vercel:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend/Wisp
          vercel-args: '--prod'

# Required GitHub Secrets:
# - VERCEL_TOKEN (from Vercel account settings -> Tokens)
# - VERCEL_ORG_ID (from .vercel/project.json after running `vercel link`)
# - VERCEL_PROJECT_ID (from .vercel/project.json after running `vercel link`)
#
# Backend deploys automatically via Render's GitHub integration (no secret needed)
